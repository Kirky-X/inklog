[package]
name = "inklog"
version = "0.1.0"
edition = "2021"
authors = ["Kirky.X"]
description = "Enterprise-grade Rust logging infrastructure"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Kirky-X/inklog"

[package.metadata.docs.rs]
features = ["default", "aws", "http", "cli", "confers"]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(feature, values(\"permission\", \"sqlite\", \"postgres\", \"mysql\"))"] }

[features]
default = ["aws", "http", "cli", "dbnexus", "confers"]
confers = []
dbnexus = ["dep:dbnexus", "dep:sea-orm"]
http = ["dep:axum"]
test-local = []
aws = ["dep:aws-sdk-s3", "dep:aws-config", "dep:aws-types", "dep:aws-credential-types"]
cli = ["dep:clap", "dep:glob"]
debug = []
metrics = []

[dependencies]
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["std", "fmt", "registry", "env-filter"] }
tracing-core = "0.1"
crossbeam-channel = "0.5"
tokio = { version = "1.49", features = ["full"] }
rayon = "1.11"
num_cpus = "1.17"
futures = { version = "0.3", features = ["executor"] }
owo-colors = { version = "4.2", features = ["supports-colors"] }
regex = "1.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = { version = "0.9" }
confers = { path = "/home/dev/projects/confers", features = ["cli", "snapshot"] }
validator = { version = "0.19", features = ["derive"] }
thiserror = "2.0"
anyhow = "1.0"
num-traits = "0.2"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
axum = { version = "0.8", optional = true }
uuid = { version = "1.20", features = ["v4"] }
hostname = "0.4"
is-terminal = "0.4"
once_cell = "1.21"
nix = { version = "0.31", features = ["fs"] }
bytes = "1.11"
dirs = "6.0"
parking_lot = "0.12"
oxcache = { path = "/home/dev/projects/oxcache" }
moka = { version = "0.12", default-features = false, features = ["sync"] }
dashmap = "6.1"
zstd = "0.13"
aes-gcm = "0.10"
rand = "0.9"
base64 = "0.22"
parquet = { version = "57.2", features = ["async"] }
arrow-array = "57.2"
arrow-schema = "57.2"
dbnexus = { path = "/home/dev/projects/dbnexus", default-features = false, features = ["sqlite", "sql-parser", "config-env", "macros", "permission"], optional = true }
sea-orm = { version = "2.0.0-rc.30", default-features = false, features = ["runtime-tokio-native-tls", "with-chrono"], optional = true }
aws-sdk-s3 = { version = "1.120.0", features = ["rt-tokio"], optional = true }
aws-config = { version = "1.8.12", features = ["behavior-version-latest", "rt-tokio"], optional = true }
aws-types = { version = "1.3", optional = true }
aws-credential-types = { version = "1.2", optional = true }
flate2 = "1.1"
brotli = "8.0"
lz4 = "1.28"
cron = "0.15"
chrono-tz = "0.10"
tokio-cron-scheduler = "0.15"
zeroize = "1.8"
zeroize_derive = "1.4"
sha2 = "0.10"
pbkdf2 = "0.12"
clap = { version = "4.5", features = ["derive", "env"], optional = true }
glob = { version = "0.3", optional = true }

[dev-dependencies]
tempfile = "3.24"
criterion = { version = "0.8", features = ["async_tokio"] }
serial_test = "3.3"
axum = "0.8"
log = "0.4"
reqwest = { version = "0.13", features = ["json"] }
filetime = "0.2"
bytes = "1.11"
assert_cmd = "2.0"
predicates = "3.0"

[[bench]]
name = "inklog_bench"
harness = false

[[bin]]
name = "inklog-cli"
path = "src/cli/mod.rs"
